<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>scheme.js — デモ</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --link: #58a6ff;
      --accent: #238636;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    main {
      max-width: 42rem;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 3rem;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
      font-weight: 700;
    }
    .lead {
      margin: 0 0 2rem;
      color: var(--muted);
    }
    .cards {
      display: grid;
      gap: 1rem;
    }
    a.card {
      display: block;
      padding: 1.1rem 1.25rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      transition: border-color 0.15s, transform 0.15s;
    }
    a.card:hover {
      border-color: var(--link);
      transform: translateY(-1px);
    }
    a.card h2 {
      margin: 0 0 0.35rem;
      font-size: 1.05rem;
      color: var(--link);
    }
    a.card p {
      margin: 0;
      font-size: 0.92rem;
      color: var(--muted);
    }
    footer {
      margin-top: 2.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      font-size: 0.88rem;
      color: var(--muted);
    }
    footer a { color: var(--link); }
  </style>
</head>
<body>
  <main>
    <h1>scheme.js</h1>
    <p class="lead">
      JavaScript 製 Scheme インタプリタ（R5RS / R7RS）。ブラウザ上でそのまま動作するデモです。
    </p>

    <div class="cards">
      <a class="card" href="demo.html">
        <h2>デモ</h2>
        <p>マクロ・継続・数値タワー・syntax-rules などを一括実行して結果を表示します。</p>
      </a>
      <a class="card" href="repl.html">
        <h2>REPL</h2>
        <p>ターミナル風 UI で Scheme を対話的に評価できます。</p>
      </a>
      <a class="card" href="sicp-repl.html">
        <h2>SICP 演習 REPL</h2>
        <p>計算機プログラムの構造と解釈 — 章ごとの演習問題を選んで実行できます。</p>
      </a>
      <a class="card" href="debug.html">
        <h2>デバッガ</h2>
        <p>評価過程をステップ実行し、環境とイベントを追跡できます。</p>
      </a>
    </div>

    <footer>
      <a href="https://github.com/nsas454/scheme.js">GitHub リポジトリ</a>
      · MIT License
    </footer>
  </main>
</body>
</html>
