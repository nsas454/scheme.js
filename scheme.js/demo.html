<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="utf-8">
	<title>scheme.js demo</title>
</head>

<body>
	<h1>scheme.js demo</h1>
	<p>下の枠に &lt;script type="text/scheme"&gt; の (display ...) の出力が表示されます。</p>
	<pre id="scheme-output" style="background:#111;color:#0f0;padding:1em;"></pre>

	<!-- インタプリタ本体 -->
	<script src="schemInp.js"></script>

	<!-- Scheme コードを直接書いて実行 -->
	<script type="text/scheme">
		(display "hello from scheme")
		(display (+ 1 2 3))

		(define (make-adder n) (lambda (x) (+ x n)))
		(define add5 (make-adder 5))
		(display (add5 10))

		(define-macro (when test body) (list 'if test body 0))
		(display (when (eq? 1 1) 42))

		(display (call/cc (lambda (k) (+ 1 (k 99)))))

		(display (let loop ((i 1) (acc 0)) (if (> i 10) acc (loop (+ i 1) (+ acc i)))))
		(newline)
		(display (do ((i 0 (+ i 1)) (s 0 (+ s i))) ((= i 5) s)))
		(newline)
		(define a 7)
		(write `(answer ,(* a 6)))
		(newline)
		(display (map (lambda (x) (* x x)) (list 1 2 3 4)))
		(newline)
		(display (apply + (list 1 2 3 4 5)))
		(newline)
		(write (string-append "char=" (number->string (char->integer #\A))))
		(newline)

		;; --- syntax-rules (パターンマッチに基づくマクロ) ---
		(define-syntax my-and
		  (syntax-rules ()
		    ((_) #t)
		    ((_ e) e)
		    ((_ e1 e2 ...) (if e1 (my-and e2 ...) #f))))
		(display (my-and 1 2 3))
		(newline)

		;; --- 数値タワー (多倍長整数 / 有理数 / exact-inexact) ---
		(write (* 1000000000000 1000000000000))
		(newline)
		(write (+ 1/3 1/6))
		(newline)
		(write (list (exact? 3) (inexact? 3.0) (expt 2 -2)))
		(newline)

		;; --- 本物のペア (cons セル / ドット対) ---
		(write (cons 1 2))
		(newline)
		(write '(1 2 . 3))
		(newline)
		(define p (cons 'x 'y))
		(set-cdr! p 'z)
		(write p)
		(newline)
		(define (sum . xs) (apply + xs))
		(display (sum 1 2 3 4 5))
		(newline)

		;; --- 複素数 ---
		(write (* 3+4i 1+2i))
		(newline)
		(write (list (magnitude 3+4i) (real-part 3+4i) (sqrt -1)))
		(newline)
		(write (sin (make-rectangular 1 2)))
		(newline)
		(write (exp +i))
		(newline)

		;; --- I/O ポート(文字列ポート) ---
		(display (call-with-output-string
		           (lambda (p) (display "x=" p) (write (+ 20 22) p))))
		(newline)
		(define ip (open-input-string "(+ 1 2 3) hello"))
		(write (eval (read ip)))
		(write (read ip))
	</script>
</body>

</html>
